# ClusterSecretStore tells ESO HOW to connect to Vault.
# It is cluster-scoped — all namespaces can use this store.
# ExternalSecret objects in any namespace reference this store by name.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "taskapi-dev"
          serviceAccountRef:
            name: "taskapi"
            namespace: "taskapi-dev"