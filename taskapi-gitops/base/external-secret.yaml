# ExternalSecret says WHAT to fetch from Vault and WHERE to store it.
# ESO reads this and creates a real Kubernetes Secret named 'taskapi-secrets'.
#
# The actual secret VALUE never lives in Git.
# Only this reference (path in Vault) lives in Git.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: taskapi-secrets
  namespace: taskapi-dev
  annotations:
    # ArgoCD sync wave -1: create this Secret BEFORE the Deployment starts.
    # Without this, the pod could start before the secret exists, causing a crash.
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 15m   # Re-fetch from Vault every 15 minutes (for rotation)
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: taskapi-secrets    # Name of the Kubernetes Secret ESO will create
    creationPolicy: Owner     # ESO owns and manages this Secret's lifecycle
  data:
    - secretKey: db-password    # Key in the Kubernetes Secret
      remoteRef:
        key: taskapi/dev        # Path in Vault
        property: db-password   # Field within that Vault secret
    - secretKey: api-key
      remoteRef:
        key: taskapi/dev
        property: api-key