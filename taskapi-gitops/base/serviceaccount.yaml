# ── What is a ServiceAccount? ────────────────────────────────────────────────
# Every pod in Kubernetes runs as a ServiceAccount — it is the pod's identity.
# By default, pods use the 'default' ServiceAccount, which has no permissions.
#
# We create a dedicated ServiceAccount for taskapi because:
#   Phase 7 (Vault): Vault verifies the pod's identity via its ServiceAccount JWT token
#   Phase 11 (RBAC): We bind permissions to this specific ServiceAccount
#   Phase 12 (Istio): Istio uses the ServiceAccount as the pod's cryptographic identity
#
# Principle of least privilege: this ServiceAccount will have ONLY the permissions
# it needs — nothing more.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: taskapi
  namespace: taskapi-dev
  labels:
    app: taskapi