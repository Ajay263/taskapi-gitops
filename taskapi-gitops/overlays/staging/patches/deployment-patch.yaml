apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskapi
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: taskapi
          env:
            - name: ENVIRONMENT
              value: staging
            - name: LOG_LEVEL
              value: INFO
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"