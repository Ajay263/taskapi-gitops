# Override the Vault path to use staging secrets (not dev)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: taskapi-secrets
spec:
  data:
    - secretKey: db-password
      remoteRef:
        key: taskapi/staging      # ← staging path (not dev)
        property: db-password
    - secretKey: api-key
      remoteRef:
        key: taskapi/staging
        property: api-key