# Strategic Merge Patch — only specify what CHANGES from base.
# Everything not listed here is inherited unchanged.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskapi
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: taskapi
          env:
            - name: ENVIRONMENT
              value: dev
            - name: LOG_LEVEL
              value: DEBUG    # More verbose in dev — easier debugging
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "100m"