# ── Developer role — full access in dev, read-only in staging/prod ──────────
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: developer
  namespace: taskapi-dev
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/exec", "services", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]  # Can verify secrets exist, not create/update (Vault does that)
  - apiGroups: [""]
    resources: ["pods/portforward"]
    verbs: ["create"]
---
# ── Read-only role — view only, no exec, no changes ─────────────────────────
# Used for developers viewing staging and prod for debugging
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: readonly
  namespace: taskapi-staging
rules:
  - apiGroups: ["apps", ""]
    resources: ["deployments", "replicasets", "pods", "services", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # pods/exec is intentionally ABSENT — developers cannot exec into staging/prod pods
  # (Security control: production pods should not be debugged interactively)
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: readonly
  namespace: taskapi-prod
rules:
  - apiGroups: ["apps", ""]
    resources: ["deployments", "replicasets", "pods", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
# ── Prometheus ClusterRole — metrics scraping across all namespaces ──────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-scraper
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "nodes/metrics", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics", "/metrics/cadvisor"]
    verbs: ["get"]