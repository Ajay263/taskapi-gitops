# ServiceMonitor is a Custom Resource from the kube-prometheus-stack.
# It tells Prometheus: "Find Services labelled 'app: taskapi' in these namespaces
# and scrape their /metrics endpoint every 15 seconds."
#
# Prometheus discovers ServiceMonitors automatically — no Prometheus config editing.
# This is the Kubernetes-native way to add scrape targets.
#
# Note: The 'release: kube-prometheus-stack' label MUST match the Helm release name.
# Without it, Prometheus ignores this ServiceMonitor.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: taskapi
  namespace: monitoring
  labels:
    release: kube-prometheus-stack   # ← Must match Helm release name
    app: taskapi
spec:
  namespaceSelector:
    matchNames:
      - taskapi-dev
      - taskapi-staging
      - taskapi-prod
  selector:
    matchLabels:
      app: taskapi   # Find Services with this label
  endpoints:
    - port: http      # The named port in base/service.yaml
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s